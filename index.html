<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>ぬりえあそび</title>

<!-- ホーム画面に追加したときのアプリ設定 -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#ff7a59">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ぬりえ">
<meta name="mobile-web-app-capable" content="yes">

<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #fff6e9;
    --panel: #ffffff;
    --ink: #3a3226;
    --accent1: #ff7a59;
    --accent2: #4fb3a9;
    --accent3: #ffd23f;
    --line: #e3d9c6;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html, body{ height:100%; }
  body{
    margin:0;
    overflow:hidden;
    font-family:"Baloo 2", sans-serif;
    background:
      radial-gradient(circle at 8% 12%, #ffe9cf 0%, transparent 40%),
      radial-gradient(circle at 92% 85%, #d9f0ec 0%, transparent 45%),
      var(--bg);
    color:var(--ink);
    height:calc(var(--app-vh, 1vh) * 100);
    display:flex;
    justify-content:center;
  }
  .app-shell{
    width:100%;
    max-width:900px;
    height:100%;
    display:flex;
    flex-direction:column;
    padding-left: env(safe-area-inset-left);
    padding-right: env(safe-area-inset-right);
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
  }

  /* ---------- 上バー ---------- */
  .top-bar{
    flex:0 0 auto;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:6px 8px;
    gap:8px;
  }
  .top-bar .title{
    font-weight:800;
    font-size:15px;
    color:var(--accent1);
    white-space:nowrap;
  }
  .icon-btn{
    border:none;
    background:var(--panel);
    box-shadow:0 4px 0 var(--line);
    border-radius:14px;
    padding:6px 10px;
    font-family:inherit;
    font-weight:700;
    font-size:13px;
    display:flex;
    align-items:center;
    gap:6px;
    cursor:pointer;
    color:var(--ink);
    white-space:nowrap;
  }
  .icon-btn:active{ transform:translateY(2px); box-shadow:0 2px 0 var(--line); }

  /* ---------- 塗り絵エリア(画面のほとんどを占める) ---------- */
  .canvas-area{
    flex:1;
    min-height:0;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:2px;
    position:relative;
  }
  .board-wrap{
    background:var(--panel);
    border-radius:14px;
    padding:2px;
    box-shadow:0 4px 0 var(--line);
    position:relative;
  }
  .board-scroll{
    overflow:auto;
    border-radius:10px;
    -webkit-overflow-scrolling:touch;
  }
  .canvas-stack{ position:relative; width:100%; height:100%; }
  .canvas-stack canvas{ position:absolute; top:0; left:0; width:100%; height:100%; display:block; }
  #colorLayer{ background:#fff; touch-action:none; cursor:crosshair; z-index:1; }
  #previewLayer{ background:transparent; pointer-events:none; z-index:2; }
  #lineLayer{ background:transparent; pointer-events:none; z-index:3; }

  .zoom-controls{
    position:absolute;
    top:10px; right:10px;
    z-index:6;
    display:flex;
    align-items:center;
    gap:2px;
    background:rgba(255,255,255,0.92);
    border-radius:999px;
    padding:3px;
    box-shadow:0 2px 0 var(--line);
  }
  .zoom-btn{
    width:26px; height:26px; border-radius:50%; border:none;
    background:#f4efe2; color:var(--ink); font-weight:800; font-size:15px;
    cursor:pointer; display:flex; align-items:center; justify-content:center; padding:0;
  }
  .zoom-btn:disabled{ color:#c9beac; cursor:not-allowed; }
  .zoom-label{ font-size:11px; font-weight:700; color:#8a7f6c; width:36px; text-align:center; cursor:pointer; }

  /* ---------- 下バー(どうぐ・いろ) ---------- */
  .bottom-bar{
    flex:0 0 auto;
    background:var(--panel);
    border-radius:22px 22px 0 0;
    box-shadow:0 -4px 0 var(--line);
    padding:8px 10px 10px;
    display:flex;
    flex-direction:column;
    gap:8px;
  }
  .tool-row{
    display:flex;
    align-items:center;
    gap:6px;
    flex-wrap:nowrap;
    overflow-x:auto;
  }
  .tool-btn{
    border:3px solid transparent;
    background:#f4efe2;
    border-radius:12px;
    padding:8px 12px;
    font-family:inherit;
    font-weight:700;
    font-size:14px;
    cursor:pointer;
    display:flex; align-items:center; gap:5px;
    white-space:nowrap;
    flex-shrink:0;
  }
  .tool-btn.active{ border-color:var(--accent2); background:#e6f5f3; }
  .brush-size-wrap{ display:flex; align-items:center; gap:4px; flex:1; min-width:90px; max-width:140px; }
  .brush-size-wrap span{ font-size:16px; }
  .spacer{ flex:1; }
  .small-btn{
    border:none; border-radius:12px; padding:8px 10px; font-family:inherit;
    font-weight:700; font-size:12px; cursor:pointer; color:#fff;
    white-space:nowrap; flex-shrink:0;
  }
  .small-btn.undo{background:var(--accent2);}
  .small-btn.clear{background:#c9beac;}
  .small-btn.save{background:var(--accent1);}
  .small-btn:disabled{background:#e4ddcd; color:#b8ae9b; cursor:not-allowed;}

  .color-row{
    display:flex;
    align-items:center;
    gap:6px;
    flex-wrap:wrap;
    justify-content:flex-start;
    max-height:76px;
    overflow-y:auto;
  }
  .swatch{ width:30px; height:30px; min-width:30px; border-radius:50%; border:3px solid #fff; box-shadow:0 0 0 2px var(--line); cursor:pointer; padding:0; }
  .swatch.active{ box-shadow:0 0 0 3px var(--ink); transform:scale(1.08); }
  .swatch-wrap{ position:relative; width:30px; height:30px; min-width:30px; }
  .swatch-del{
    position:absolute; top:-5px; right:-5px; width:15px; height:15px; border-radius:50%;
    border:none; background:rgba(60,50,40,0.8); color:#fff; font-size:9px; line-height:15px;
    text-align:center; padding:0; cursor:pointer;
  }
  .swatch-add-wrap{ position:relative; width:30px; height:30px; min-width:30px; }
  .swatch-add-visual{
    width:30px; height:30px; border-radius:50%;
    border:2px dashed var(--line); background:transparent; color:var(--accent1);
    font-weight:800; font-size:15px; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    pointer-events:none; /* タップは下の本物の input が受け取る */
  }
  .swatch-add-input{
    position:absolute; top:0; left:0; width:30px; height:30px;
    opacity:0; padding:0; border:0; margin:0; cursor:pointer;
  }
  input[type=range]{ accent-color:var(--accent1); width:100%; }
  input[type=color]{ width:30px;height:30px;border:none;border-radius:50%;overflow:hidden;padding:0;cursor:pointer;background:none; }
  .visually-hidden{
    position:absolute;
    width:1px; height:1px;
    padding:0; margin:-1px;
    overflow:hidden;
    clip:rect(0,0,0,0);
    white-space:nowrap;
    border:0;
    opacity:0;
  }
  .toast{
    position:fixed;
    left:50%;
    bottom:calc(100px + env(safe-area-inset-bottom));
    transform:translateX(-50%) translateY(16px);
    background:rgba(58,50,38,0.92);
    color:#fff;
    padding:10px 22px;
    border-radius:999px;
    font-weight:700;
    font-size:14px;
    white-space:nowrap;
    opacity:0;
    pointer-events:none;
    transition:opacity .25s ease, transform .25s ease;
    z-index:300;
  }
  .toast.show{
    opacity:1;
    transform:translateX(-50%) translateY(0);
  }

  /* ---------- モーダル(そざい選択・ほぞん一覧) ---------- */
  .modal-overlay{
    position:fixed; inset:0;
    background:rgba(58,50,38,0.55);
    z-index:50;
    display:none;
    align-items:flex-end;
    justify-content:center;
  }
  .modal-overlay.open{ display:flex; }
  .modal-sheet{
    background:var(--panel);
    width:100%;
    max-width:640px;
    max-height:78vh;
    overflow-y:auto;
    border-radius:24px 24px 0 0;
    padding:16px;
    box-shadow:0 -6px 20px rgba(0,0,0,0.15);
    transform:translateY(16px);
    opacity:0;
    transition:transform .2s ease, opacity .2s ease;
  }
  .modal-overlay.open .modal-sheet{ transform:translateY(0); opacity:1; }
  .modal-header{
    display:flex; align-items:center; justify-content:space-between;
    font-weight:800; font-size:16px; margin-bottom:12px;
  }
  .modal-close{
    border:none; background:#f4efe2; width:30px; height:30px; border-radius:50%;
    font-weight:800; cursor:pointer;
  }

  .materials-grid{ display:flex; flex-wrap:wrap; gap:12px; }
  .materials-transfer-row{
    display:flex;
    gap:10px;
    margin-top:16px;
    padding-top:14px;
    border-top:1px solid var(--line);
  }
  .import-btn-wrap{ position:relative; }
  .import-btn-wrap input[type=file]{
    position:absolute; top:0; left:0; width:100%; height:100%;
    opacity:0; margin:0; padding:0; cursor:pointer;
  }
  .materials-transfer-hint{
    font-size:11px;
    color:#8a7f6c;
    margin-top:8px;
    line-height:1.5;
  }
  .material-chip{
    flex:0 0 auto; width:76px; display:flex; flex-direction:column; align-items:center; gap:5px;
    border:none; background:none; cursor:pointer; padding:2px;
  }
  .material-thumb{
    width:68px; height:68px; border-radius:16px; background:#f4efe2;
    border:3px solid transparent; display:flex; align-items:center; justify-content:center;
    font-size:30px; overflow:hidden;
  }
  .material-chip.active .material-thumb{ border-color:var(--accent2); background:#e6f5f3; }
  .material-thumb img{ width:100%; height:100%; object-fit:cover; }
  .material-label{ font-size:11px; font-weight:700; color:#8a7f6c; max-width:76px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .material-chip.add-chip .material-thumb{ border:2px dashed var(--line); background:transparent; color:var(--accent1); }

  .gallery-empty{ font-size:13px; color:#c2b8a4; }
  .gallery-grid{ display:flex; flex-wrap:wrap; gap:10px; }
  .gallery-item{ position:relative; width:76px; height:76px; border-radius:12px; overflow:hidden; border:2px solid var(--line); cursor:pointer; }
  .gallery-item img{ width:100%; height:100%; object-fit:cover; display:block; }
  .gallery-del{
    position:absolute; top:2px; right:2px; width:20px; height:20px; border-radius:50%;
    border:none; background:rgba(60,50,40,0.75); color:#fff; font-size:12px;
    line-height:20px; text-align:center; padding:0; cursor:pointer;
  }

  /* ---------- 横向き(横はば > 高さ)のときは、右に細い操作パネル、
     残り全部をぬりえエリアにする ---------- */
  @media (orientation:landscape){
    .app-shell{
      display:grid;
      grid-template-columns: 1fr 200px;
      grid-template-rows: auto 1fr;
      grid-template-areas:
        "canvas top"
        "canvas side";
      height:100%;
      max-width:none;
    }
    .top-bar{
      grid-area: top;
      flex-direction:column;
      align-items:stretch;
      gap:6px;
      padding:8px 8px 4px;
    }
    .top-bar .title{ display:none; }
    .canvas-area{ grid-area: canvas; padding:4px; }
    .bottom-bar{
      grid-area: side;
      border-radius:0;
      box-shadow:none;
      border-left:1px solid var(--line);
      overflow-y:auto;
      height:100%;
    }
    .tool-row{ flex-wrap:wrap; overflow-x:visible; }
    .brush-size-wrap{ flex:1 1 100%; max-width:none; order:10; }
    .spacer{ display:none; }
    .color-row{ max-height:none; }
  }
</style>
</head>
<body>

  <div class="app-shell">
    <div class="top-bar">
      <button class="icon-btn" id="open-materials">🐶 そざい</button>
      <span class="title">ぬりえあそび</span>
      <button class="icon-btn" id="open-gallery">📁 さくひん</button>
    </div>

    <div class="canvas-area" id="canvas-area">
      <div class="board-wrap">
        <div class="board-scroll" id="board-scroll">
          <div class="canvas-stack" id="canvas-stack">
            <canvas id="colorLayer" width="560" height="560"></canvas>
            <canvas id="previewLayer" width="560" height="560"></canvas>
            <canvas id="lineLayer" width="560" height="560"></canvas>
          </div>
        </div>
        <div class="zoom-controls">
          <button class="zoom-btn" id="zoom-out">－</button>
          <span class="zoom-label" id="zoom-label" title="タップで100%に戻す">100%</span>
          <button class="zoom-btn" id="zoom-in">＋</button>
        </div>
      </div>
    </div>

    <div class="bottom-bar">
      <div class="tool-row">
        <button class="tool-btn active" id="tool-pen" title="ペン">✏️ ペン</button>
        <button class="tool-btn" id="tool-fill" title="ぬりつぶし">🪣 ぬり</button>
        <div class="brush-size-wrap">
          <span>●</span>
          <input type="range" id="brush-size" min="2" max="30" value="10">
        </div>
        <div class="spacer"></div>
        <button class="small-btn undo" id="btn-undo" title="ひとつ もどす">↩️ もどす</button>
        <button class="small-btn clear" id="btn-clear" title="さいしょから やりなおす">🔄 はじめから</button>
        <button class="small-btn save" id="btn-save" title="がぞうとして ほぞんする">💾 ほぞん</button>
      </div>
      <div class="color-row" id="palette-swatches"></div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <!-- そざいをえらぶモーダル -->
  <div class="modal-overlay" id="materials-overlay">
    <div class="modal-sheet">
      <div class="modal-header"><span>そざいをえらぶ</span><button class="modal-close" id="materials-close">✕</button></div>
      <div class="materials-grid" id="materials-grid"></div>
      <div class="materials-transfer-row">
        <button class="icon-btn" id="export-materials">⬇️ 書き出す</button>
        <div class="import-btn-wrap">
          <span class="icon-btn" style="pointer-events:none;">⬆️ 読み込む</span>
          <input type="file" id="import-materials-input" accept="application/json,.json">
        </div>
      </div>
      <div class="materials-transfer-hint">「書き出す」で作ったファイルを、別のスマホで「読み込む」から選ぶと、同じそざいが使えるようになります。</div>
    </div>
  </div>

  <!-- ほぞんした さくひんモーダル -->
  <div class="modal-overlay" id="gallery-overlay">
    <div class="modal-sheet">
      <div class="modal-header"><span>ほぞんした さくひん</span><button class="modal-close" id="gallery-close">✕</button></div>
      <div class="gallery-empty" id="gallery-empty">まだありません</div>
      <div class="gallery-grid" id="gallery-grid"></div>
    </div>
  </div>

<script>
/* ---------- キャンバスを3まい用意する ---------- */
const colorCanvas = document.getElementById('colorLayer');
const colorCtx = colorCanvas.getContext('2d');
const previewCanvas = document.getElementById('previewLayer');
const previewCtx = previewCanvas.getContext('2d');
const lineCanvas = document.getElementById('lineLayer');
const lineCtx = lineCanvas.getContext('2d');
const W = colorCanvas.width, H = colorCanvas.height;

/* ---------- 1. したえ(線画) ---------- */

function drawDogOutline(){
  lineCtx.clearRect(0,0,W,H);
  lineCtx.strokeStyle = '#2c2620';
  lineCtx.lineWidth = 7;
  lineCtx.lineJoin = 'round';
  lineCtx.lineCap = 'round';

  [[190,410],[360,410],[220,450],[330,450]].forEach(([x,y])=>{
    lineCtx.beginPath();
    roundedRect(lineCtx, x, y, 36, 90, 14);
    lineCtx.stroke();
  });

  lineCtx.beginPath();
  lineCtx.moveTo(430,350);
  lineCtx.quadraticCurveTo(500,310,478,250);
  lineCtx.quadraticCurveTo(470,235,452,250);
  lineCtx.quadraticCurveTo(465,300,410,335);
  lineCtx.closePath();
  lineCtx.stroke();

  lineCtx.beginPath();
  lineCtx.ellipse(280,370,150,95,0,0,Math.PI*2);
  lineCtx.stroke();

  lineCtx.beginPath();
  lineCtx.arc(280,210,95,0,Math.PI*2);
  lineCtx.stroke();

  lineCtx.beginPath();
  lineCtx.ellipse(205,140,32,58,-0.35,0,Math.PI*2);
  lineCtx.stroke();
  lineCtx.beginPath();
  lineCtx.ellipse(355,140,32,58,0.35,0,Math.PI*2);
  lineCtx.stroke();

  lineCtx.beginPath();
  lineCtx.ellipse(280,245,48,32,0,0,Math.PI*2);
  lineCtx.stroke();

  lineCtx.fillStyle = '#2c2620';
  lineCtx.beginPath(); lineCtx.arc(248,200,6,0,Math.PI*2); lineCtx.fill();
  lineCtx.beginPath(); lineCtx.arc(312,200,6,0,Math.PI*2); lineCtx.fill();
  lineCtx.beginPath(); lineCtx.ellipse(280,240,9,7,0,0,Math.PI*2); lineCtx.fill();
}

function drawCatOutline(){
  lineCtx.clearRect(0,0,W,H);
  lineCtx.strokeStyle = '#2c2620';
  lineCtx.lineWidth = 7;
  lineCtx.lineJoin = 'round';
  lineCtx.lineCap = 'round';

  lineCtx.beginPath();
  lineCtx.moveTo(415,400);
  lineCtx.quadraticCurveTo(500,400,505,320);
  lineCtx.quadraticCurveTo(508,270,470,255);
  lineCtx.quadraticCurveTo(480,290,472,320);
  lineCtx.quadraticCurveTo(465,370,398,375);
  lineCtx.closePath();
  lineCtx.stroke();

  [[195,410],[350,410],[225,450],[320,450]].forEach(([x,y])=>{
    lineCtx.beginPath();
    roundedRect(lineCtx, x, y, 34, 85, 14);
    lineCtx.stroke();
  });

  lineCtx.beginPath();
  lineCtx.ellipse(275,365,140,90,0,0,Math.PI*2);
  lineCtx.stroke();

  lineCtx.beginPath();
  lineCtx.arc(275,205,88,0,Math.PI*2);
  lineCtx.stroke();

  drawTriangle(lineCtx, 200,145, 165,80, 235,120);
  drawTriangle(lineCtx, 350,145, 385,80, 315,120);

  lineCtx.fillStyle = '#2c2620';
  lineCtx.beginPath(); lineCtx.arc(245,200,6,0,Math.PI*2); lineCtx.fill();
  lineCtx.beginPath(); lineCtx.arc(305,200,6,0,Math.PI*2); lineCtx.fill();
  lineCtx.beginPath(); lineCtx.moveTo(275,225); lineCtx.lineTo(268,215); lineCtx.lineTo(282,215); lineCtx.closePath(); lineCtx.fill();

  lineCtx.lineWidth = 3;
  [[230,235,150,225],[228,245,150,248],[230,255,150,268],
   [320,235,400,225],[322,245,400,248],[320,255,400,268]].forEach(p=>{
    lineCtx.beginPath(); lineCtx.moveTo(p[0],p[1]); lineCtx.lineTo(p[2],p[3]); lineCtx.stroke();
  });
}

function drawTriangle(ctx,x1,y1,x2,y2,x3,y3){
  ctx.beginPath();
  ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.lineTo(x3,y3); ctx.closePath();
  ctx.stroke();
}
function drawTriangle(ctx,x1,y1,x2,y2,x3,y3){
  ctx.beginPath();
  ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.lineTo(x3,y3); ctx.closePath();
  ctx.stroke();
}

function roundedRect(ctx,x,y,w,h,r){
  ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r);
  ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r);
  ctx.arcTo(x,y,x+w,y,r);
  ctx.closePath();
}

function resetColorLayer(){
  colorCtx.clearRect(0,0,W,H);
  colorCtx.fillStyle = '#ffffff';
  colorCtx.fillRect(0,0,W,H);
  previewCtx.clearRect(0,0,W,H);
  undoStack = [];
  updateUndoButton();
}

/* ---------- もどす(アンドゥ) ---------- */
const MAX_UNDO = 20;
let undoStack = [];
function pushUndo(){
  undoStack.push(colorCtx.getImageData(0,0,W,H));
  if(undoStack.length > MAX_UNDO) undoStack.shift();
  updateUndoButton();
}
function undo(){
  if(!undoStack.length) return;
  const prev = undoStack.pop();
  colorCtx.putImageData(prev, 0, 0);
  updateUndoButton();
}
function updateUndoButton(){
  const btn = document.getElementById('btn-undo');
  if(btn) btn.disabled = undoStack.length === 0;
}

/* ---------- どうぐの状態 ---------- */
let currentTool = 'pen';
let currentColor = '#ef4444';
let brushSize = 10;
let isDrawing = false;
let lastX = 0, lastY = 0;
let currentMaskCanvas = null;

document.getElementById('brush-size').addEventListener('input', (e)=>{ brushSize = Number(e.target.value); });

function setTool(tool){
  currentTool = tool;
  document.getElementById('tool-pen').classList.toggle('active', tool==='pen');
  document.getElementById('tool-fill').classList.toggle('active', tool==='fill');
}
document.getElementById('tool-pen').addEventListener('click', ()=>setTool('pen'));
document.getElementById('tool-fill').addEventListener('click', ()=>setTool('fill'));
document.getElementById('btn-undo').addEventListener('click', undo);
document.getElementById('btn-clear').addEventListener('click', ()=> resetColorLayer());

/* ---------- いろパレット ---------- */
const DEFAULT_COLORS = ['#ef4444','#ff9f1c','#ffd23f','#7fd858','#4fb3a9','#7ec8e3','#5b8def','#b06ae0','#ff6f9c','#f7c8a0','#5a4636','#9c9c9c','#000000','#ffffff'];
let customColors = [];
const paletteSwatchesEl = document.getElementById('palette-swatches');

function selectColor(hex){ currentColor = hex; renderPalette(); }
function addCustomColor(hex){
  hex = hex.toLowerCase();
  if(!DEFAULT_COLORS.includes(hex) && !customColors.includes(hex)) customColors.push(hex);
  selectColor(hex);
}
function deleteCustomColor(hex){
  customColors = customColors.filter(c => c !== hex);
  if(currentColor === hex) currentColor = DEFAULT_COLORS[0];
  renderPalette();
}
function renderPalette(){
  paletteSwatchesEl.innerHTML = '';
  DEFAULT_COLORS.forEach(c=>{
    const b = document.createElement('button');
    b.className = 'swatch' + (c===currentColor ? ' active' : '');
    b.style.background = c;
    b.addEventListener('click', ()=> selectColor(c));
    paletteSwatchesEl.appendChild(b);
  });
  customColors.forEach(c=>{
    const wrap = document.createElement('div');
    wrap.className = 'swatch-wrap';
    const b = document.createElement('button');
    b.className = 'swatch' + (c===currentColor ? ' active' : '');
    b.style.background = c;
    b.addEventListener('click', ()=> selectColor(c));
    const del = document.createElement('button');
    del.className = 'swatch-del';
    del.textContent = '✕';
    del.title = 'この色をけす';
    del.addEventListener('click', (e)=>{ e.stopPropagation(); deleteCustomColor(c); });
    wrap.appendChild(b); wrap.appendChild(del);
    paletteSwatchesEl.appendChild(wrap);
  });

  /* 「＋」は見た目だけの飾りで、その真上に本物の <input type="color"> を
     透明にして重ねてある。指は必ず本物の入力欄に直接触れるので、
     ボタン経由でクリックを飛ばす方式より確実にスマホで開く。 */
  const addWrap = document.createElement('div');
  addWrap.className = 'swatch-add-wrap';
  const addVisual = document.createElement('div');
  addVisual.className = 'swatch-add-visual';
  addVisual.textContent = '＋';
  const addInput = document.createElement('input');
  addInput.type = 'color';
  addInput.className = 'swatch-add-input';
  addInput.title = '色をつくって保存する';
  addInput.value = currentColor;
  addInput.addEventListener('input', (e)=> addCustomColor(e.target.value));
  addWrap.appendChild(addVisual);
  addWrap.appendChild(addInput);
  paletteSwatchesEl.appendChild(addWrap);
}
renderPalette();

const canvasAreaEl = document.getElementById('canvas-area');

function fitCanvasArea(){
  const rect = canvasAreaEl.getBoundingClientRect();
  const w = Math.max(160, Math.floor(rect.width) - 10);
  const h = Math.max(160, Math.floor(rect.height) - 10);

/* ---------- ズーム(絵の拡大) ---------- */
const MIN_ZOOM = 1, MAX_ZOOM = 3, ZOOM_STEP = 0.25;
let zoomLevel = 1;
const zoomLabel = document.getElementById('zoom-label');
const zoomInBtn = document.getElementById('zoom-in');
const zoomOutBtn = document.getElementById('zoom-out');

function applyZoom(){
  const sizePercent = zoomLevel * 100;
  canvasStackEl.style.width = sizePercent + '%';
  canvasStackEl.style.height = sizePercent + '%';
  zoomLabel.textContent = Math.round(sizePercent) + '%';
  zoomOutBtn.disabled = zoomLevel <= MIN_ZOOM;
  zoomInBtn.disabled = zoomLevel >= MAX_ZOOM;
}
zoomInBtn.addEventListener('click', ()=>{
  zoomLevel = Math.min(MAX_ZOOM, +(zoomLevel + ZOOM_STEP).toFixed(2));
  applyZoom();
});
zoomOutBtn.addEventListener('click', ()=>{
  zoomLevel = Math.max(MIN_ZOOM, +(zoomLevel - ZOOM_STEP).toFixed(2));
  applyZoom();
});
zoomLabel.addEventListener('click', ()=>{
  zoomLevel = 1; applyZoom(); boardScrollEl.scrollTo(0,0);
});

function selectMaterial(id){
  const m = materials.find(x=>x.id===id);
  if(!m) return;
  currentMaterialId = id;
  resetColorLayer();
  if(m.type === 'builtin'){ m.render(); }
  else { lineCtx.clearRect(0,0,W,H); lineCtx.putImageData(m.lineImageData, 0, 0); }
  renderMaterialsGrid();
}

function imageToLineData(img){
  const temp = document.createElement('canvas');
  temp.width = W; temp.height = H;
  const tctx = temp.getContext('2d');
  const scale = Math.min(W / img.width, H / img.height);
  const dw = img.width * scale, dh = img.height * scale;
  const dx = (W - dw) / 2, dy = (H - dh) / 2;
  tctx.drawImage(img, dx, dy, dw, dh);

  const imgData = tctx.getImageData(0,0,W,H);
  const data = imgData.data;
  const threshold = 200;
  for(let i=0; i<data.length; i+=4){
    if(data[i+3] === 0) continue;
    const brightness = (data[i] + data[i+1] + data[i+2]) / 3;
    if(brightness > threshold){ data[i+3] = 0; }
    else { data[i]=44; data[i+1]=38; data[i+2]=32; data[i+3]=255; }
  }
  return imgData;
}

function imageDataToDataUrl(imgData){
  const c = document.createElement('canvas');
  c.width = W; c.height = H;
  c.getContext('2d').putImageData(imgData, 0, 0);
  return c.toDataURL('image/png');
}

function handleMaterialFiles(e){
  const files = Array.from(e.target.files || []);
  files.forEach((file, idx)=>{
    const reader = new FileReader();
    reader.onload = (ev)=>{
      const img = new Image();
      img.onload = ()=>{
        const lineImageData = imageToLineData(img);
        const id = 'material-' + Date.now() + '-' + idx;
        // 線だけの絵(ほぼ透明なPNG)にしてから保存する。容量が小さくすむため。
        const lineDataUrl = imageDataToDataUrl(lineImageData);
        materials.push({
          id, label: 'そざい' + (materials.filter(m=>m.type==='image').length + 1),
          type: 'image', lineImageData, thumbDataUrl: lineDataUrl,
        });
        selectMaterial(id);
        saveMaterialsToStorage();
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  });
  e.target.value = '';
}

/* ---------- そざいを次回もひきつぐ(ブラウザに保存) ---------- */
const MATERIALS_STORAGE_KEY = 'nurie_materials_v1';

function saveMaterialsToStorage(){
  try{
    const list = materials
      .filter(m => m.type === 'image')
      .map(m => ({ id:m.id, label:m.label, lineDataUrl:m.thumbDataUrl }));
    localStorage.setItem(MATERIALS_STORAGE_KEY, JSON.stringify(list));
  }catch(err){
    // 保存できる容量をこえた場合など。アプリ自体は問題なく使えるようにそのまま続ける。
    showToast('⚠️ そざいの保存容量がいっぱいかもしれません');
  }
}

function loadMaterialsFromStorage(){
  let raw;
  try{ raw = localStorage.getItem(MATERIALS_STORAGE_KEY); }catch(err){ return; }
  if(!raw) return;
  let list;
  try{ list = JSON.parse(raw); }catch(err){ return; }
  if(!Array.isArray(list)) return;

  list.forEach(item=>{
    if(!item || !item.lineDataUrl) return;
    const img = new Image();
    img.onload = ()=>{
      const temp = document.createElement('canvas');
      temp.width = W; temp.height = H;
      const tctx = temp.getContext('2d');
      tctx.drawImage(img, 0, 0, W, H);
      const lineImageData = tctx.getImageData(0,0,W,H);
      materials.push({
        id: item.id, label: item.label,
        type: 'image', lineImageData, thumbDataUrl: item.lineDataUrl,
      });
      renderMaterialsGrid();
    };
    img.src = item.lineDataUrl;
  });
}

/* ---------- 他のスマホへ そざいを持っていく(書き出し・読み込み) ---------- */

function exportMaterials(){
  const list = materials
    .filter(m => m.type === 'image')
    .map(m => ({ id:m.id, label:m.label, lineDataUrl:m.thumbDataUrl }));
  if(list.length === 0){
    showToast('書き出せる そざいが まだありません');
    return;
  }
  const blob = new Blob([JSON.stringify(list)], { type:'application/json' });
  const url = URL.createObjectURL(blob);
  const link = document.createElement('a');
  link.download = 'nurie-sozai.json';
  link.href = url;
  link.click();
  URL.revokeObjectURL(url);
  showToast('⬇️ そざいを書き出しました');
}

function importMaterialsFromFile(file){
  const reader = new FileReader();
  reader.onload = (ev)=>{
    let list;
    try{ list = JSON.parse(ev.target.result); }catch(err){
      showToast('⚠️ このファイルは読み込めませんでした');
      return;
    }
    if(!Array.isArray(list)){
      showToast('⚠️ このファイルは読み込めませんでした');
      return;
    }
    const existingIds = new Set(materials.map(m=>m.id));
    let addedCount = 0;
    let pending = 0;

    list.forEach(item=>{
      if(!item || !item.lineDataUrl || existingIds.has(item.id)) return;
      pending++;
      const img = new Image();
      img.onload = ()=>{
        const temp = document.createElement('canvas');
        temp.width = W; temp.height = H;
        const tctx = temp.getContext('2d');
        tctx.drawImage(img, 0, 0, W, H);
        const lineImageData = tctx.getImageData(0,0,W,H);
        materials.push({
          id: item.id, label: item.label,
          type: 'image', lineImageData, thumbDataUrl: item.lineDataUrl,
        });
        addedCount++;
        renderMaterialsGrid();
        pending--;
        if(pending === 0){
          saveMaterialsToStorage();
          showToast('⬆️ ' + addedCount + 'こ そざいを読み込みました');
        }
      };
      img.src = item.lineDataUrl;
    });

    if(pending === 0) showToast('あたらしい そざいはありませんでした');
  };
  reader.readAsText(file);
}

document.getElementById('export-materials').addEventListener('click', exportMaterials);
document.getElementById('import-materials-input').addEventListener('change', (e)=>{
  const file = e.target.files && e.target.files[0];
  if(file) importMaterialsFromFile(file);

/* ---------- ペンツール(はみ出し防止つき) ---------- */

function getPos(e){
  const rect = colorCanvas.getBoundingClientRect();
  const scaleX = colorCanvas.width / rect.width;
  const scaleY = colorCanvas.height / rect.height;
  const clientX = e.touches ? e.touches[0].clientX : e.clientX;
  const clientY = e.touches ? e.touches[0].clientY : e.clientY;
  return { x:(clientX-rect.left)*scaleX, y:(clientY-rect.top)*scaleY };
}

function computeRegionMask(startX, startY){
  if(startX<0||startY<0||startX>=W||startY>=H) return null;
  const lineData = lineCtx.getImageData(0,0,W,H).data;
  const startIdx = startY*W+startX;
  if(lineData[startIdx*4+3] > 50) return null;

  const mask = new Uint8Array(W*H);
  const stack = [[startX,startY]];
  while(stack.length){
    const [x,y] = stack.pop();
    if(x<0||y<0||x>=W||y>=H) continue;
    const idx = y*W+x;
    if(mask[idx]) continue;
    const p = idx*4;
    if(lineData[p+3] > 50) continue;
    mask[idx] = 1;
    stack.push([x+1,y],[x-1,y],[x,y+1],[x,y-1]);
  }
  return mask;
}

function maskToCanvas(mask){
  const c = document.createElement('canvas');
  c.width = W; c.height = H;
  const cx = c.getContext('2d');
  const id = cx.createImageData(W,H);
  for(let i=0;i<mask.length;i++){ if(mask[i]) id.data[i*4+3] = 255; }
  cx.putImageData(id,0,0);
  return c;
}

function applyMaskToPreview(){
  if(!currentMaskCanvas) return;
  previewCtx.save();
  previewCtx.globalCompositeOperation = 'destination-in';
  previewCtx.drawImage(currentMaskCanvas,0,0);
  previewCtx.restore();
}

/* 線のフチがぼやけて半透明になっていると、あとから別の線が重なったときに
   うっすら「わく」のように見えてしまうため、色がついた部分は完全に不透明、
   ついていない部分は完全に透明、の二択にそろえる(アンチエイリアスを消す) */
function crispifyPreviewAlpha(){
  const img = previewCtx.getImageData(0,0,W,H);
  const d = img.data;
  for(let i=3; i<d.length; i+=4){
    d[i] = d[i] > 10 ? 255 : 0;
  }
  previewCtx.putImageData(img,0,0);
}

function touchDistance(t0, t1){
  const dx = t0.clientX - t1.clientX;
  const dy = t0.clientY - t1.clientY;
  return Math.sqrt(dx*dx + dy*dy);
}
function touchMidpoint(t0, t1){
  return { x:(t0.clientX + t1.clientX)/2, y:(t0.clientY + t1.clientY)/2 };
}
let pinchStartDist = null;
let pinchStartZoom = 1;
let pinchStartMidX = 0, pinchStartMidY = 0;
let pinchStartScrollLeft = 0, pinchStartScrollTop = 0;

function startDraw(e){
  if(e.touches && e.touches.length === 2){
    e.preventDefault();
    isDrawing = false;
    previewCtx.clearRect(0,0,W,H);
    currentMaskCanvas = null;
    pinchStartDist = touchDistance(e.touches[0], e.touches[1]);
    pinchStartZoom = zoomLevel;
    const mid = touchMidpoint(e.touches[0], e.touches[1]);
    pinchStartMidX = mid.x; pinchStartMidY = mid.y;
    pinchStartScrollLeft = boardScrollEl.scrollLeft;
    pinchStartScrollTop = boardScrollEl.scrollTop;
    return;
  }
  if(e.touches && e.touches.length > 1) return;

  e.preventDefault();
  const pos = getPos(e);

  if(currentTool === 'fill'){
    pushUndo();
    floodFill(Math.floor(pos.x), Math.floor(pos.y), currentColor);
    return;
  }

  pushUndo();
  isDrawing = true;
  lastX = pos.x; lastY = pos.y;

  const mask = computeRegionMask(Math.floor(pos.x), Math.floor(pos.y));
  currentMaskCanvas = mask ? maskToCanvas(mask) : null;

  previewCtx.clearRect(0,0,W,H);
  previewCtx.fillStyle = currentColor;
  previewCtx.beginPath();
  previewCtx.arc(pos.x,pos.y,brushSize/2,0,Math.PI*2);
  previewCtx.fill();
  applyMaskToPreview();
  crispifyPreviewAlpha();
}

function moveDraw(e){
  if(e.touches && e.touches.length === 2 && pinchStartDist){
    e.preventDefault();
    // 指のひろがり具合でズーム
    const newDist = touchDistance(e.touches[0], e.touches[1]);
    const ratio = newDist / pinchStartDist;
    zoomLevel = Math.min(MAX_ZOOM, Math.max(MIN_ZOOM, +(pinchStartZoom * ratio).toFixed(2)));
    applyZoom();
    // 2本指の中心の移動ぶんだけ、横・縦にずらす(パン)
    const mid = touchMidpoint(e.touches[0], e.touches[1]);
    const dx = mid.x - pinchStartMidX;
    const dy = mid.y - pinchStartMidY;
    boardScrollEl.scrollLeft = pinchStartScrollLeft - dx;
    boardScrollEl.scrollTop = pinchStartScrollTop - dy;
    return;
  }
  if(!isDrawing) return;
  if(e.touches && e.touches.length > 1) return;
  e.preventDefault();
  const pos = getPos(e);
  previewCtx.strokeStyle = currentColor;
  previewCtx.lineWidth = brushSize;
  previewCtx.lineCap = 'round';
  previewCtx.beginPath();
  previewCtx.moveTo(lastX,lastY);
  previewCtx.lineTo(pos.x,pos.y);
  previewCtx.stroke();
  applyMaskToPreview();
  crispifyPreviewAlpha();
  lastX = pos.x; lastY = pos.y;
}

function endDraw(e){
  if(e && e.touches && e.touches.length < 2){
    pinchStartDist = null;
  }
  if(!e || !e.touches || e.touches.length === 0){
    if(isDrawing){
      crispifyPreviewAlpha();
      colorCtx.drawImage(previewCanvas,0,0);
      previewCtx.clearRect(0,0,W,H);
      currentMaskCanvas = null;
    }
    isDrawing = false;
  }
}

colorCanvas.addEventListener('mousedown', startDraw);
colorCanvas.addEventListener('mousemove', moveDraw);
colorCanvas.addEventListener('mouseup', endDraw);
colorCanvas.addEventListener('mouseleave', endDraw);
colorCanvas.addEventListener('touchstart', startDraw, {passive:false});
colorCanvas.addEventListener('touchmove', moveDraw, {passive:false});
colorCanvas.addEventListener('touchend', endDraw);

/* ---------- ぬりつぶし(バケツ)ツール ---------- */

function hexToRgb(hex){
  hex = hex.replace('#','');
  if(hex.length===3) hex = hex.split('').map(c=>c+c).join('');
  const num = parseInt(hex,16);
  return [ (num>>16)&255, (num>>8)&255, num&255 ];
}

function floodFill(startX, startY, fillHex){
  if(startX<0||startY<0||startX>=W||startY>=H) return;

  const lineData = lineCtx.getImageData(0,0,W,H).data;
  const colorImgData = colorCtx.getImageData(0,0,W,H);
  const data = colorImgData.data;
  const [fr,fg,fb] = hexToRgb(fillHex);

  const startPos = (startY*W+startX)*4;
  if(lineData[startPos+3] > 50) return;

  const sr=data[startPos], sg=data[startPos+1], sb=data[startPos+2];
  if (Math.abs(sr-fr)<8 && Math.abs(sg-fg)<8 && Math.abs(sb-fb)<8) return;

  const tolerance = 40;
  const stack = [[startX,startY]];
  const visited = new Uint8Array(W*H);

  while(stack.length){
    const [x,y] = stack.pop();
    if(x<0||y<0||x>=W||y>=H) continue;
    const idx = y*W+x;
    if(visited[idx]) continue;
    const pos = idx*4;
    if(lineData[pos+3] > 50) continue;

    const r=data[pos], g=data[pos+1], b=data[pos+2];
    if(Math.abs(r-sr)>tolerance || Math.abs(g-sg)>tolerance || Math.abs(b-sb)>tolerance) continue;

    visited[idx] = 1;
    data[pos]=fr; data[pos+1]=fg; data[pos+2]=fb; data[pos+3]=255;
    stack.push([x+1,y],[x-1,y],[x,y+1],[x,y-1]);
  }
  colorCtx.putImageData(colorImgData,0,0);
}

/* ---------- さいしょの1まいを描く ---------- */
renderMaterialsGrid();
selectMaterial('dog');
fitCanvasArea();
applyZoom();
loadMaterialsFromStorage();
window.addEventListener('load', fitCanvasArea);

/* ---------- ホーム画面アプリ化(サービスワーカー) ----------
   file:// で直接開いた場合や、対応していないブラウザでは自動的にスキップされる。
   https:// で公開ホスティングしたときに、オフライン利用・インストールが有効になる。
------------------------------------------------------------------- */
if('serviceWorker' in navigator && (location.protocol === 'https:' || location.hostname === 'localhost')){
  window.addEventListener('load', ()=>{
    navigator.serviceWorker.register('service-worker.js').catch(()=>{});
  });
}
